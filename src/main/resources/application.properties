# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ──────────────────────────────────────────────────────────────────────
# Use validate instead of update — Flyway handles schema now
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Flyway Migrations ────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:aspcs_super_secret_key_change_in_production_min_256_bits}
app.jwt.access-token-expiry=86400000
app.jwt.refresh-token-expiry=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dug0g6tli}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ─── Circular ref fix ─────────────────────────────────────────────────────────
spring.main.allow-circular-references=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.aspcs=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework.security=WARN
