# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api/v1

# ─── Database ─────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/aspcs_db
spring.datasource.username=postgres
spring.datasource.password=pcs123123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=aspcs_super_secret_key_change_this_in_production_min_256_bits_long
app.jwt.access-token-expiry=86400000
app.jwt.refresh-token-expiry=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── Cloudinary ───────────────────────────────────────────────────────────────
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.aspcs=DEBUG
logging.level.org.springframework.security=WARN
spring.main.allow-circular-references=true