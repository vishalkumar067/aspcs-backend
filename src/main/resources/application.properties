# ─── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ─── Database (Railway PostgreSQL) ───────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:aspcs_super_secret_key_change_this_in_production_min_256_bits}
app.jwt.access-token-expiry=86400000
app.jwt.refresh-token-expiry=604800000

# ─── CORS ─────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.aspcs=INFO
logging.level.org.springframework.security=WARN

# ─── Circular ref fix ─────────────────────────────────────────────────────────
spring.main.allow-circular-references=true